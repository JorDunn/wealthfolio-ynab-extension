name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Package addon zip
        run: npm run package

      - name: Upload addon zip
        uses: actions/upload-artifact@v7
        with:
          name: wealthfolio-ynab-sync-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error
